services:

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # INFRAESTRUCTURA COMPARTIDA
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  # ── RabbitMQ local DESACTIVADO ──────────────────────────────────────────
  # Migrado a CloudAMQP (ver vars RABBITMQ_* en .env). restaurante/cocina/
  # barbarismo apuntan al broker gestionado. Se deja comentado por si se
  # quiere volver al broker local en desarrollo.
  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: gastrosena-rabbitmq
  #   user: "0:0"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "ping"]
  #     interval: 15s
  #     timeout: 30s
  #     retries: 10
  #     start_period: 60s
  #   networks:
  #     - gastrosena-net

  zipkin:
    image: openzipkin/zipkin:3
    container_name: gastrosena-zipkin
    restart: unless-stopped
    ports:
      - "9412:9411"     # panel: http://localhost:9412 (9411 lo ocupa otro stack)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks:
      - gastrosena-net

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # BASES DE DATOS (una por microservicio â€” aislamiento total)
  # Host ports escalonados para no chocar si tenÃ©s MySQL local.
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  restaurante-db:
    image: mysql:8.0
    container_name: gastrosena-restaurante-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: modulo_restaurante
    ports:
      - "3308:3306"
    volumes:
      - restaurante_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  inventario-db:
    image: mysql:8.0
    container_name: gastrosena-inventario-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: inventario_v2
      MYSQL_USER: inventario
      MYSQL_PASSWORD: inventario
    # Sin puerto al host (lo usaba otro stack): solo accesible en gastrosena-net.
    expose:
      - "3306"
    volumes:
      - inventario_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "inventario", "-pinventario"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  cocina-db:
    image: mysql:8.0
    container_name: gastrosena-cocina-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "Carlos2515."
      MYSQL_DATABASE: ProyectoFormativo
    ports:
      - "3309:3306"
    volumes:
      - cocina_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  barbarismo-db:
    image: mysql:8.0
    container_name: gastrosena-barbarismo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin1
      MYSQL_DATABASE: ProyectoFormativo
    ports:
      - "3310:3306"
    volumes:
      - barbarismo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  usuarios-db:
    image: mysql:8.0
    container_name: gastrosena-usuarios-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: usuarios_db
      MYSQL_USER: usuario_app
      MYSQL_PASSWORD: clave_segura
    ports:
      - "3311:3306"
    volumes:
      - usuarios_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # MICROSERVICIOS BACKEND
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  restaurante:
    image: eidertapasco/ga-ms-restaurante:latest
    container_name: gastrosena-restaurante
    hostname: gastrosena
    environment:
      DB_USERNAME: root
      DB_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:mysql://restaurante-db:3306/modulo_restaurante?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
      # RabbitMQ gestionado (CloudAMQP) — valores desde .env, con fallback al broker local.
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_SSL: ${RABBITMQ_SSL:-false}
    # Sin puerto al host: solo accesible vía gateway dentro de gastrosena-net.
    expose:
      - "8080"
    depends_on:
      restaurante-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      gastrosena-net:
        aliases:
          - gastrosena

  inventario:
    image: stiven77/ga-ms-inventario:latest
    container_name: gastrosena-inventario
    environment:
      DB_URL: jdbc:mysql://inventario-db:3306/inventario_v2?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
      DB_USERNAME: inventario
      DB_PASSWORD: inventario
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_PROFILES_ACTIVE: default
      # Microservicio de reportes: inventario le delega la generaciÃ³n de documentos (PDF del GIL).
      INVENTORY_INTEGRATIONS_REPORTES_BASE_URL: http://reportes:8083
    expose:
      - "8081"
    depends_on:
      inventario-db:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gastrosena-net

  cocina:
    image: andres2515/ga-ms-cocina:latest
    container_name: gastrosena-cocina
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://cocina-db:3306/ProyectoFormativo?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "Carlos2515."
      # RabbitMQ gestionado (CloudAMQP) — valores desde .env, fallback al broker local.
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_SSL_ENABLED: ${RABBITMQ_SSL:-false}
      PORT: 8082
      # cocina autentica por headers en runtime, pero su ga-lib-security pinneado
      # construye JwtConfig incondicionalmente: el secreto DEBE resolverse al
      # arrancar. Mismo valor que usuarios/gateway, inyectado desde .env.
      SECURITY_SECRET: ${SECURITY_SECRET:?defina SECURITY_SECRET en GastroSenaDocker/.env}
      # Rol asumido cuando NO llega el header X-User-Rol (acceso directo a :8082
      # sin pasar por el gateway). VacÃ­o ("") = cerrado: en Swagger hay que declarar
      # el rol con el botÃ³n Authorize (X-User-Rol). El menÃº pÃºblico no se ve afectado.
      SECURITY_DEV_FALLBACK_ROL: ""
    # Publicado al host para acceder a Swagger directo: http://localhost:8082/swagger-ui/index.html
    ports:
      - "8082:8082"
    depends_on:
      cocina-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gastrosena-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gastrosena-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - gastrosena-net

  barbarismo:
    image: jhojanalvarez71/ga-ms-barbarismo:latest
    container_name: gastrosena-barbarismo
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://barbarismo-db:3306/ProyectoFormativo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin1
      # RabbitMQ gestionado (CloudAMQP) — valores desde .env, fallback al broker local.
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_SSL_ENABLED: ${RABBITMQ_SSL:-false}
    expose:
      - "8086"
    depends_on:
      barbarismo-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gastrosena-net

  usuarios:
    image: sofigarcia30/ga-ms-usuarios:latest
    container_name: gastrosena-usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://usuarios-db:3306/usuarios_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: usuario_app
      SPRING_DATASOURCE_PASSWORD: clave_segura
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # MISMO secreto que el gateway: si no coinciden, el gateway rechaza todo token.
      SECURITY_SECRET: ${SECURITY_SECRET:?defina SECURITY_SECRET en GastroSenaDocker/.env}
    expose:
      - "8081"
    depends_on:
      usuarios-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gastrosena-net

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # REPORTES (ga-ms-reportes) â€” lee datos de los demÃ¡s microservicios por la red
  # Imagen local: construir con  ./mvnw -DskipTests package  +  docker build -t ga-ms-reportes:latest .
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  reportes-db:
    image: mysql:8.0
    container_name: gastrosena-reportes-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "12345"
      MYSQL_DATABASE: gastrosena_reportes
    ports:
      - "3312:3306"
    volumes:
      - reportes_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - gastrosena-net

  reportes:
    image: rodiguezramirezsebastian/ga-ms-reportes:latest
    container_name: gastrosena-reportes
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://reportes-db:3306/gastrosena_reportes?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "12345"
      # URLs por nombre de servicio dentro de la red Docker (no localhost)
      SERVICES_RESTAURANTE_URL: http://restaurante:8080
      SERVICES_INVENTARIO_URL: http://inventario:8081
      SERVICES_COCINA_URL: http://cocina:8082
      SERVICES_BARBARISMO_URL: http://barbarismo:8086
      SERVICES_USUARIOS_URL: http://usuarios:8081
    expose:
      - "8083"
    depends_on:
      reportes-db:
        condition: service_healthy
      usuarios:
        condition: service_started
    restart: unless-stopped
    networks:
      - gastrosena-net

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # API GATEWAY â€” ÃšNICO PUNTO DE ENTRADA
  # Valida el JWT, inyecta X-User-* downstream y enruta por DNS de Docker.
  # Es el Ãºnico servicio (ademÃ¡s del front) que expone puerto al host.
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  gateway:
    image: stiven77/api-gateway:latest
    container_name: gastrosena-gateway
    environment:
      GATEWAY_PORT: 8088
      # MISMO secreto que usa usuarios para firmar el JWT. Se inyecta desde .env
      # (no se hardcodea). Falla el arranque si no estÃ¡ definido.
      SECURITY_SECRET: ${SECURITY_SECRET:?defina SECURITY_SECRET en GastroSenaDocker/.env}
      SECURITY_EXPIRATION_MS: 3600000
      SECURITY_REFRESH_THRESHOLD_MS: 300000
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,https://app.gastrosena.uk"
      SVC_USUARIOS_URI: http://usuarios:8081
      SVC_INVENTARIO_URI: http://inventario:8081
      SVC_RESTAURANTE_URI: http://restaurante:8080
      SVC_COCINA_URI: http://cocina:8082
      SVC_BARBARISMO_URI: http://barbarismo:8086
      SVC_REPORTES_URI: http://reportes:8083
    ports:
      - "8088:8088"
    depends_on:
      - restaurante
      - inventario
      - cocina
      - barbarismo
      - usuarios
      - reportes
    restart: unless-stopped
    networks:
      - gastrosena-net

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # FRONTEND
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  frontend:
    image: stiven77/frontend-gastrosena:latest
    container_name: gastrosena-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - restaurante
      - inventario
      - cocina
      - barbarismo
      - usuarios
      - reportes
    networks:
      - gastrosena-net

